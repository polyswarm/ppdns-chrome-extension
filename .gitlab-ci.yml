include:
  - project: 'externalci/ci-image'
    ref: master
    file: '.gitlab-ci-default.yaml'

stages:
  - image
  - build

variables:
  BASE_IMAGE_NAME: ppdns-extensions

###############################################################
# Image Stage — build & push the base Docker image once
###############################################################

build-image:
  extends: .build-docker
  stage: image

###############################################################
# Build Stage — run pre-built image with env-specific vars
###############################################################

.BUILD:
  stage: build
  tags:
    - kube-new
  script:
    - docker run
      -e POLYSWARM_API_URL -e BATCH_SIZE -e NODE_ENV -e APPLICATION=build
      -v $PWD/dist:/usr/src/app/dist:rw
      $REPO_URL/$BASE_IMAGE_NAME:$CI_COMMIT_REF_SLUG
  artifacts:
    name: "extensions-$CI_JOB_NAME-$CI_COMMIT_SHA"
    paths:
    - "dist/*.zip"
    expire_in: 1 week


build-local:
  extends: .BUILD
  variables:
    POLYSWARM_API_URL: http://artifact-index-e2e:9696
    BATCH_SIZE: 3
    NODE_ENV: development


build-stage:
  extends: .BUILD
  variables:
    POLYSWARM_API_URL: https://api.stage-v3.polyswarm.network
    BATCH_SIZE: 10
    NODE_ENV: production


build-prod:
  extends: .BUILD
  variables:
    POLYSWARM_API_URL: https://api.polyswarm.network
    BATCH_SIZE: 10
    NODE_ENV: production
  only:
    - prod
